name: Generate Saudi Channels M3U Playlist

on:
  schedule:
    # Run every 6 hours (at minute 0 of every 6th hour)
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'

# Set permissions for GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt
        
    - name: Generate M3U playlist
      run: |
        python scripts/generate_m3u.py
      env:
        # You can use secrets for tokens if they need to be kept private
        CHANNEL_TOKEN: ${{ secrets.CHANNEL_TOKEN }}
        
    - name: Create deployment directory
      run: |
        mkdir -p deployment
        cp output/saudi_channels.m3u deployment/
        cp output/stream_urls.txt deployment/
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./deployment
        publish_branch: gh-pages
        keep_files: false
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Update M3U playlist [skip ci]'
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'push' && contains(github.ref, 'tags')
      with:
        files: |
          output/saudi_channels.m3u
          output/stream_urls.txt
        generate_release_notes: true
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: saudi-channels-m3u
        path: |
          output/
          !output/**/*.gitkeep
        retention-days: 7
