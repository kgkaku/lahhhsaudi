name: Generate Saudi Channels M3U Playlist

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'

# Set environment variable to test Node.js 24 compatibility early
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt
        
    - name: Generate M3U playlist
      id: generate
      run: |
        python scripts/generate_m3u.py
      env:
        CHANNEL_TOKEN: ${{ secrets.CHANNEL_TOKEN }}
        
    - name: Verify output
      run: |
        if [ ! -f output/saudi_channels.m3u ]; then
          echo "❌ M3U file was not generated!"
          exit 1
        fi
        echo "✅ M3U file generated successfully"
        ls -la output/
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4  # Updated to v4 for better Node compatibility
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./output
        publish_branch: gh-pages
        keep_files: false
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Update M3U playlist [skip ci]'
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: saudi-channels-m3u
        path: output/
        retention-days: 7
